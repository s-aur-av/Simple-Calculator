<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Calculator</title>
  <link rel="icon" type="image/png" href="../favicon/calculator.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="calculator" aria-label="Mini calculator">
    <div class="display" id="display">0</div>

    <div class="buttons">
      <button class="clear" type="button" data-action="clear">C</button>
      <button type="button" data-action="delete">DEL</button>
      <button class="operator" type="button" data-value="%">%</button>
      <button class="operator" type="button" data-value="/">/</button>

      <button type="button" data-value="7">7</button>
      <button type="button" data-value="8">8</button>
      <button type="button" data-value="9">9</button>
      <button class="operator" type="button" data-value="*">x</button>

      <button type="button" data-value="4">4</button>
      <button type="button" data-value="5">5</button>
      <button type="button" data-value="6">6</button>
      <button class="operator" type="button" data-value="-">-</button>

      <button type="button" data-value="1">1</button>
      <button type="button" data-value="2">2</button>
      <button type="button" data-value="3">3</button>
      <button class="operator" type="button" data-value="+">+</button>

      <button class="zero" type="button" data-value="0">0</button>
      <button type="button" data-value=".">.</button>
      <button class="equal" type="button" data-action="calculate">=</button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
